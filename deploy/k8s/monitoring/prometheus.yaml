apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: aiinfra
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: gateway
        metrics_path: /metrics
        static_configs:
          - targets: ["gateway:8080"]
      - job_name: rag
        metrics_path: /metrics
        static_configs:
          - targets: ["rag:8081"]
      - job_name: inference
        metrics_path: /metrics
        static_configs:
          - targets: ["inference:8082"]
      - job_name: agent
        metrics_path: /metrics
        static_configs:
          - targets: ["agent:8083"]
      - job_name: milvus
        metrics_path: /metrics
        static_configs:
          - targets: ["milvus:9091"]
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
