# 复制为 secret.yaml 并填入真实值，或使用 scripts/k8s_create_secret.ps1 从 .env 生成
apiVersion: v1
kind: Secret
metadata:
  name: aiinfra-secret
  namespace: aiinfra
type: Opaque
stringData:
  MODEL_API_KEY: "sk-your-api-key"
  MYSQL_ROOT_PASSWORD: "root"
  MYSQL_PASSWORD: "aiinfra"
  REDIS_PASSWORD: ""
  MINIO_SECRET_KEY: "minioadmin"
  ADMIN_TOKEN: "change-me-admin-token"
