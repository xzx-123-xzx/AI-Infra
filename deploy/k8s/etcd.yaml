apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: etcd-data
  namespace: aiinfra
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  namespace: aiinfra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.5
          command:
            - etcd
            - -advertise-client-urls=http://127.0.0.1:2379
            - -listen-client-urls=http://0.0.0.0:2379
            - --data-dir=/etcd
          env:
            - name: ETCD_AUTO_COMPACTION_MODE
              value: revision
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "1000"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "4294967296"
            - name: ETCD_SNAPSHOT_COUNT
              value: "50000"
          ports:
            - containerPort: 2379
          volumeMounts:
            - name: data
              mountPath: /etcd
          readinessProbe:
            exec:
              command: ["etcdctl", "endpoint", "health"]
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: etcd-data
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: aiinfra
spec:
  selector:
    app: etcd
  ports:
    - port: 2379
      targetPort: 2379
