apiVersion: v1
kind: ConfigMap
metadata:
  name: aiinfra-config
  namespace: aiinfra
data:
  MODEL_BASE_URL: "https://api.openai.com/v1"
  MODEL_NAME: "gpt-4o-mini"
  MYSQL_HOST: "mysql"
  MYSQL_USER: "aiinfra"
  MYSQL_DATABASE: "aiinfra"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  MILVUS_HOST: "milvus"
  MILVUS_PORT: "19530"
  MILVUS_DATABASE_NAME: "default"
  MILVUS_COLLECTION_NAME: "aiinfra_kb"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_BUCKET: "aiinfra"
  MINIO_SECURE: "false"
  EMBEDDING_BACKEND: "auto"
  EMBEDDING_MODEL: "text-embedding-3-small"
  EMBEDDING_DIMENSION: "1536"
  BGE_M3_PATH: "models/bge-m3"
  BGE_RERANKER_PATH: "models/bge-reranker-base"
  RERANK_BACKEND: "auto"
  BGE_DEVICE: "cpu"
  BGE_EMBEDDING_DIMENSION: "1024"
  PARENT_CHUNK_SIZE: "1200"
  CHILD_CHUNK_SIZE: "300"
  CHUNK_OVERLAP: "50"
  RETRIEVAL_K: "5"
  CANDIDATE_M: "2"
  GATEWAY_HOST: "0.0.0.0"
  GATEWAY_PORT: "8080"
  RAG_HOST: "0.0.0.0"
  RAG_PORT: "8081"
  DEFAULT_RATE_LIMIT_RPM: "60"
  AVAILABLE_MODELS: "gpt-4o-mini,gpt-4o"
  CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
  VALID_SOURCES: '["ai","java","test","ops","bigdata"]'
