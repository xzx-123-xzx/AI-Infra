apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rag-data
  namespace: aiinfra
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rag-models
  namespace: aiinfra
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag
  namespace: aiinfra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag
  template:
    metadata:
      labels:
        app: rag
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: rag
          image: aiinfra/rag:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: aiinfra-config
            - secretRef:
                name: aiinfra-secret
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: models
              mountPath: /app/models
            - name: logs
              mountPath: /app/logs
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              memory: 4Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rag-data
        - name: models
          persistentVolumeClaim:
            claimName: rag-models
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rag
  namespace: aiinfra
spec:
  selector:
    app: rag
  ports:
    - port: 8081
      targetPort: 8081
