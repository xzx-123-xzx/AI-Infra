apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  namespace: aiinfra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: inference
          image: aiinfra/inference:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: aiinfra-config
            - secretRef:
                name: aiinfra-secret
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          readinessProbe:
            httpGet:
              path: /ready
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: inference
  namespace: aiinfra
spec:
  selector:
    app: inference
  ports:
    - port: 8082
      targetPort: 8082
