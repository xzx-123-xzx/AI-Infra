apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  namespace: aiinfra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: console
  template:
    metadata:
      labels:
        app: console
    spec:
      containers:
        - name: console
          image: aiinfra/console:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
      volumes:
        - name: nginx-config
          configMap:
            name: console-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: console
  namespace: aiinfra
spec:
  type: NodePort
  selector:
    app: console
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
