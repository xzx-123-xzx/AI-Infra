services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aiinfra}
      MYSQL_USER: ${MYSQL_USER:-aiinfra}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aiinfra}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.4.4
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    env_file:
      - ../../.env
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      INFERENCE_BASE_URL: http://inference:8082/v1
    volumes:
      - ../../logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      inference:
        condition: service_started

  inference:
    build:
      context: ../..
      dockerfile: services/inference/Dockerfile
    ports:
      - "${INFERENCE_PORT:-8082}:8082"
    env_file:
      - ../../.env
    environment:
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
    volumes:
      - ../../logs:/app/logs

  agent:
    build:
      context: ../..
      dockerfile: services/agent/Dockerfile
    ports:
      - "${AGENT_PORT:-8083}:8083"
    env_file:
      - ../../.env
    environment:
      RAG_INTERNAL_URL: http://rag:8081
      MYSQL_HOST: mysql
    volumes:
      - ../../logs:/app/logs
    depends_on:
      rag:
        condition: service_started

  rag:
    build:
      context: ../..
      dockerfile: services/rag/Dockerfile
    ports:
      - "${RAG_PORT:-8081}:8081"
    env_file:
      - ../../.env
    environment:
      MYSQL_HOST: mysql
      MILVUS_HOST: milvus
      MINIO_ENDPOINT: minio:9000
      ES_HOST: elasticsearch
      REDIS_HOST: redis
      HYBRID_SEARCH_ENABLED: ${HYBRID_SEARCH_ENABLED:-true}
      INGESTION_ASYNC: ${INGESTION_ASYNC:-true}
    volumes:
      - ../../logs:/app/logs
      - ../../data:/app/data
      - ../../models:/app/models
    depends_on:
      mysql:
        condition: service_healthy
      milvus:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy

  mlops:
    build:
      context: ../..
      dockerfile: services/mlops/Dockerfile
    ports:
      - "${MLOPS_PORT:-8084}:8084"
    env_file:
      - ../../.env
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    volumes:
      - ../../logs:/app/logs
      - ../../data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  console:
    build:
      context: ../..
      dockerfile: web/console/Dockerfile
    ports:
      - "${CONSOLE_PORT:-3000}:80"
    depends_on:
      - gateway
      - rag

volumes:
  mysql_data:
  etcd_data:
  minio_data:
  milvus_data:
  es_data:
